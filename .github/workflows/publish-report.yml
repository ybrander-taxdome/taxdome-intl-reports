name: Publish Weekly Report

on:
  repository_dispatch:
    types: [push-report]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write report file
        env:
          HTML_BASE64: ${{ github.event.client_payload.html_base64 }}
          FILENAME: ${{ github.event.client_payload.filename }}
        run: |
          echo "$HTML_BASE64" > /tmp/encoded.b64
          base64 -d /tmp/encoded.b64 > "$FILENAME"
          rm /tmp/encoded.b64

      - name: Commit and push
        env:
          FILENAME: ${{ github.event.client_payload.filename }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FILENAME"
          git diff --staged --quiet || git commit -m "Publish $FILENAME [automated]"
          git push
